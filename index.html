<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لعبة الأفعى</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-wrapper">
      <h1>🐍 لعبة الأفعى</h1>
      <p class="instructions">تحكم بالأفعى باستخدام الأسهم أو مفاتيح WASD واجمع الطعام لزيادة النقاط.</p>

      <section class="hud" aria-label="لوحة النتائج">
        <div>النقاط: <span id="score">0</span></div>
        <div>أفضل نتيجة: <span id="highScore">0</span></div>
      </section>

      <canvas id="board" width="420" height="420" aria-label="لوحة اللعبة"></canvas>

      <section class="controls">
        <button id="startBtn" type="button">ابدأ / إعادة تشغيل</button>
        <p id="status" role="status">اضغط على زر البدء للعب.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
